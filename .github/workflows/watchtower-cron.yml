name: Watchtower Dynamic Portfolio Tracker

on:
  schedule:
    # Run hourly for delta checks and milestone alerts
    - cron: '0 * * * *'
    # Run Sunday at 8 PM (20:00 UTC) for weekly digest
    - cron: '0 20 * * 0'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  track-portfolio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Hourly Watchtower Scan
        if: github.event.schedule != '0 20 * * 0'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VITE_DEFAULT_USERNAME: ${{ vars.GH_USERNAME || 'shlokkokk' }}
        run: npm run track

      - name: Run Weekly Digest Scan
        if: github.event.schedule == '0 20 * * 0'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VITE_DEFAULT_USERNAME: ${{ vars.GH_USERNAME || 'shlokkokk' }}
        run: npm run track -- --weekly

      - name: Commit & Push Updated Snapshots
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chmod: update Watchtower snapshots [skip ci]" && git push)
